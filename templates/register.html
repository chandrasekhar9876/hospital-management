{% extends "base.html" %}
{% block content %}
<div class="form-card">
    <h3 class="mb-3">Register</h3>
    <form method="POST" action="{{ url_for('register') }}">
        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input name="name" class="form-control" placeholder="Enter full name" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input name="email" type="email" class="form-control" placeholder="name@example.com" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input name="password" type="password" class="form-control" placeholder="Create password" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Role</label>
            <select name="role" class="form-select" required>
                <option value="patient">Patient</option>
                <option value="doctor">Doctor</option>
                <option value="admin">Admin</option>
            </select>
        </div>
        <button class="btn btn-primary w-100" type="submit">Create Account</button>
    </form>
</div>
{% endblock %}
